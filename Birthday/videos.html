<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Videos 🎥</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fecfef);
      text-align: center;
      color: #fff;
    }

    .container {
      padding: 20px;
    }

    h1 {
      font-size: 3em;
      animation: fadeIn 2s ease-in-out;
    }

    .media {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-top: 20px;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: -90px;
      margin-bottom: 50px;
    }

    .second-row {
      margin-top: -60px;
    }

    .third-row {
      margin-top: -60px;
    }

    .card {
      position: relative;
      width: 260px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      transform: rotate(-2deg);
      transition: transform 0.3s, z-index 0.3s;
      background: #fff;
    }

    .card:hover {
      transform: rotate(0deg) translateY(-10px);
      z-index: 10;
    }

    .card.card-2,
    .second-row .card.card-2 {
      transform: rotate(2deg);
      z-index: 5;
    }

    .second-row .card.card-1 {
      transform: rotate(-1.5deg);
      z-index: 3;
    }

    .second-row .card.card-2 {
      transform: rotate(1.5deg);
      z-index: 4;
    }

    .card img {
      width: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 77, 109, 0.9);
      color: white;
      padding: 10px;
      border-radius: 0 0 15px 15px;
      transform: translateY(100%);
      transition: 0.4s;
      font-size: 14px;
    }

    .card:hover .overlay {
      transform: translateY(0);
    }

    .videos {
      position: relative;
      max-width: 800px;
      margin: 0 auto;
    }

    .video-container {
      display: none;
    }

    .video-container.active {
      display: block;
    }

    video {
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .nav-buttons {
      margin-top: 20px;
    }

    .nav-buttons button {
      padding: 10px 20px;
      margin: 0 10px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      background-color: #ff4d6d;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .nav-buttons button:hover {
      background-color: #ff1e4d;
    }

    .nav-buttons button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px);} 
      to { opacity: 1; transform: translateY(0);} 
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎥 Birthday Videos 🎉</h1>

    <div class="media">
      <div class="row">
        <div class="card card-1">
          <video src="v1.mp4" controls></video>
          <div class="overlay">Friendship means never growing apart 🌟</div>
        </div>
        <div class="card card-2">
          <video src="v2.mp4" controls></video>
          <div class="overlay">Birthday smiles, forever memories 🎉</div>
        </div>
      </div>
      <div class="row second-row">
        <div class="card card-1">
          <video src="v3.mp4" controls></video>
          <div class="overlay">Laughter, love and best wishes 💕</div>
        </div>
        <div class="card card-2">
          <video src="v1.mp4" controls></video>
          <div class="overlay">Today is your special day 🎂</div>
        </div>
      </div>
    </div>

    <div class="nav-buttons">
      <button id="prevBtn" disabled>Previous</button>
      <button id="nextBtn">Next</button>
    </div>
  </div>

  <script>
    let currentVideo = 0;
    const videoContainers = document.querySelectorAll('.video-container');
    const videoElements = document.querySelectorAll('.video-container video');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function showVideo(index) {
      videoContainers.forEach(container => container.classList.remove('active'));
      videoContainers[index].classList.add('active');
      prevBtn.disabled = index === 0;
      nextBtn.disabled = index === videoContainers.length - 1;
      const video = videoElements[index];
      if (video) {
        video.play().catch(() => {});
      }
    }

    function handleVideoEnd() {
      if (currentVideo < videoContainers.length - 1) {
        currentVideo += 1;
        showVideo(currentVideo);
      }
    }

    videoElements.forEach(video => {
      video.addEventListener('ended', handleVideoEnd);
    });

    prevBtn.addEventListener('click', () => {
      if (currentVideo > 0) {
        currentVideo--;
        showVideo(currentVideo);
      }
    });

    nextBtn.addEventListener('click', () => {
      if (currentVideo < videoContainers.length - 1) {
        currentVideo++;
        showVideo(currentVideo);
      }
    });

    showVideo(currentVideo);
  </script>
</body>
</html>
